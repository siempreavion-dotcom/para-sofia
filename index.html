<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Sofia ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
    font-family:cursive;
    text-align:center;
    color:white;
}

/* Fondo estrellas */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
}

/* Botón corazón */
.heart-button{
    margin-top:180px;
    display:inline-block;
    padding:60px 80px;
    background:red;
    color:white;
    font-size:32px;
    border-radius:50%;
    cursor:pointer;
    box-shadow:0 0 50px red;
    transition:0.3s;
}

.heart-button:hover{
    transform:scale(1.1);
}

/* Texto abajo */
.bottom-text{
    position:absolute;
    bottom:30px;
    width:100%;
    font-size:38px;
    color:red;
}

/* Página oculta */
.hidden-page{
    display:none;
    background:#b30000;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    padding-top:80px;
}

/* Corazones flotando */
.heart{
    position:absolute;
    color:white;
    font-size:20px;
    animation: float 6s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="stars"></div>

<!-- Música -->
<audio id="music" loop>
  <source src="perfect.mp3" type="audio/mpeg">
</audio>

<div class="heart-button" onclick="startLove()">
Click Here ❤️
</div>

<div class="bottom-text">
Te amaré y cuidaré siempre de ti ❤️
</div>

<div class="hidden-page" id="lovePage">
<h1>Te amo mucho Sofia ❤️</h1>
<p>
Eres mi felicidad, eres mi lugar seguro,  
mi persona favorita en este mundo.  
Quiero estar contigo siempre.  
</p>
</div>

<script>
function startLove(){
    document.getElementById("lovePage").style.display = "block";
    document.getElementById("music").play();
}

/* Corazones flotando */
setInterval(function(){
    var heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(function(){
        heart.remove();
    },6000);

},400);
</script>

</body>
</html>
