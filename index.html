<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Sofía ❤️</title>
    <style>
        /* Estilos de fondo y tipografía */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #050505; /* Negro profundo como en tu imagen */
            color: white;
            font-family: 'Comic Sans MS', 'cursive', sans-serif;
            overflow: hidden;
        }

        /* Estrellas de fondo (opcional) */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: 0;
        }

        /* El Botón Rojo Brillante */
        #miBoton {
            position: relative;
            z-index: 10;
            padding: 20px 50px;
            font-size: 2rem;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 100px; /* Forma ovalada */
            cursor: pointer;
            box-shadow: 0 0 40px #ff0000;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #miBoton:hover {
            transform: scale(1.1);
            box-shadow: 0 0 60px #ff4d4d;
        }

        /* Texto inferior */
        .mensaje {
            margin-top: 50px;
            font-size: 1.8rem;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            z-index: 10;
            text-align: center;
        }

        /* Corazones flotantes */
        .heart {
            position: absolute;
            color: #ff0000;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: moveUp 3s linear forwards;
        }

        @keyframes moveUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <button id="miBoton">
        Click Here ❤️
    </button>

    <div class="mensaje">
        Te amaré y cuidaré siempre de ti ❤️
    </div>

    <script>
        const boton = document.getElementById('miBoton');

        boton.addEventListener('click', () => {
            // 1. Cambiar el texto del botón al hacer clic
            boton.innerHTML = "Eres mi todo ✨";
            
            // 2. Crear una lluvia de corazones
            for (let i = 0; i < 30; i++) {
                crearCorazon();
            }

            // 3. Opcional: Redirigir después de 3 segundos
            // setTimeout(() => { window.location.href = "TU_OTRO_LINK_AQUI"; }, 3000);
        });

        function crearCorazon() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 3000);
        }
    </script>
</body>
</html>
